services:
  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    ports:
      - "9411:9411"

  # 1. Config Server: Must start first to provide properties
  cloud-config:
    build:
      context: .
      dockerfile: cloud-config/Dockerfile
    ports:
      - "9296:9296"
    environment:
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
    depends_on:
      - zipkin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9296/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Service Discovery: Registration hub
  service-discovery:
    build:
      context: .
      dockerfile: service-discovery/Dockerfile
    ports:
      - "8761:8761"
    environment:
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
    depends_on:
      cloud-config:
        condition: service_healthy

  # 3. API Gateway: Public entry point
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://cloud-config:9296
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
    depends_on:
      service-discovery:
        condition: service_started

  # Business Services (Example Grouping)
  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    ports: ["8700:8700"]
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://cloud-config:9296
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
    depends_on: [service-discovery]

  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    ports: ["8500:8500"]
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://cloud-config:9296
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
    depends_on: [service-discovery]

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    ports: ["8300:8300"]
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://cloud-config:9296
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
    depends_on: [service-discovery]

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    ports: ["8400:8400"]
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://cloud-config:9296
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
    depends_on: [service-discovery]

  shipping-service:
    build:
      context: .
      dockerfile: shipping-service/Dockerfile
    ports: ["8600:8600"]
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://cloud-config:9296
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
    depends_on: [service-discovery]

  favourite-service:
    build:
      context: .
      dockerfile: favourite-service/Dockerfile
    ports: ["8800:8800"]
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://cloud-config:9296
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
    depends_on: [service-discovery]

  proxy-client:
    build:
      context: .
      dockerfile: proxy-client/Dockerfile
    ports: ["8900:8900"]
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://cloud-config:9296
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
    depends_on: [service-discovery]

networks:
  default:
    name: microservices-network
