apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: cloud-config
  name: cloud-config
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: cloud-config
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: cloud-config
    spec:
      containers:
        - env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://service-discovery:8761/eureka/
            - name: MANAGEMENT_ZIPKIN_TRACING_ENDPOINT
              value: http://zipkin:9411/api/v2/spans
            - name: SPRING_PROFILES_ACTIVE
              value: dev
          image: markcus0526/mark-ecommerce-spring-boot-cloud-config:latest  # Ensure this matches your local image name
          imagePullPolicy: IfNotPresent
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 9296
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
          name: cloud-config
          ports:
            - containerPort: 9296
              protocol: TCP
          resources:
            limits:
              memory: "2Gi"   # 2048Mi
              cpu: "1000m"    # 1 Full Core
            requests:
              memory: "1Gi"   # 1024Mi
              cpu: "500m"
      restartPolicy: Always
