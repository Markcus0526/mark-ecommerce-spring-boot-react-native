apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: product-service
  name: product-service
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: product-service
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: product-service
    spec:
      # --- INIT CONTAINERS: These run and must finish before the main app starts ---
      # --- INIT CONTAINERS: These run and must finish before the main app starts ---
      #  initContainers:
      #    - name: wait-for-service-discovery
      #      image: busybox:1.28
      #      command: [ 'sh', '-c', "until nslookup service-discovery; do echo waiting for service-discovery; sleep 2; done" ]

      #    - name: wait-for-cloud-config
      #      image: busybox:1.28
      #      command: [ 'sh', '-c', "until nc -z cloud-config 9296; do echo waiting for cloud-config; sleep 2; done" ]

      # --- MAIN CONTAINER: Your Spring Boot Application ---
      containers:
        - env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://service-discovery:8761/eureka/
            - name: EUREKA_INSTANCE_HOSTNAME
              value: product-service
            - name: MANAGEMENT_ZIPKIN_TRACING_ENDPOINT
              value: http://zipkin:9411/api/v2/spans
            - name: SPRING_CONFIG_IMPORT
              value: optional:configserver:http://cloud-config:9296
            - name: SPRING_PROFILES_ACTIVE
              value: dev
          image: markcus0526/mark-ecommerce-spring-boot-product-service:latest  # Ensure this matches your local image name
          imagePullPolicy: IfNotPresent
          name: product-service
          ports:
            - containerPort: 8500
              protocol: TCP
          resources:
            limits:
              memory: "2Gi"   # 2048Mi
              cpu: "1000m"    # 1 Full Core
            requests:
              memory: "1Gi"   # 1024Mi
              cpu: "500m"
      restartPolicy: Always
